# This rule is not used by the project nginx-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to operator.rajnco.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nginx-operator
    app.kubernetes.io/managed-by: kustomize
  name: nginxoperator-viewer-role
rules:
- apiGroups:
  - operator.rajnco.com
  resources:
  - nginxoperators
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.rajnco.com
  resources:
  - nginxoperators/status
  verbs:
  - get
